[project]

site_name        = "ml-lab"
site_description = "Claude Code plugin for structured ML hypothesis investigations using adversarial debate protocol"
site_author      = "Chris Santiago"
site_url         = "https://chris-santiago.github.io/ml-lab/"
docs_dir         = "docs"
site_dir         = "site"

repo_url  = "https://github.com/chris-santiago/ml-lab"
repo_name = "chris-santiago/ml-lab"
edit_uri  = "edit/main/docs/"

extra_css = [ "stylesheets/extra.css" ]

nav = [
    { "Home" = "index.md" },

    { "Tutorials" = [
        { "Overview"                    = "tutorials/index.md" },
        { "Installation & Prerequisites" = "tutorials/installation.md" },
        { "Worked Example: LLM Preambles" = "tutorials/worked-example.md" },
        { "Setting Up ml-journal"       = "tutorials/journal-setup.md" },
    ] },

    { "How-to" = [
        { "Overview"                    = "how-to/index.md" },
        { "Run an Investigation"        = "how-to/run-investigation.md" },
        { "Debate vs Ensemble Mode"     = "how-to/debate-vs-ensemble.md" },
        { "Monitor for Spec Drift"      = "how-to/intent-watch.md" },
        { "Log Decisions & Discoveries" = "how-to/journal-logging.md" },
        { "Checkpoint & Resume"         = "how-to/checkpoint-resume.md" },
        { "Query the Journal"           = "how-to/journal-queries.md" },
        { "Generate a Deep Dive"        = "how-to/deep-dive.md" },
        { "Add an Agent or Skill"       = "how-to/extending-plugins.md" },
    ] },

    { "Reference" = [
        { "Overview"          = "reference/index.md" },
        { "Workflow Diagram"  = "reference/ml-lab/workflow.md" },
        { "Agents"            = "reference/ml-lab/agents.md" },
        { "Skills (ml-lab)"   = "reference/ml-lab/skills.md" },
        { "Architecture"      = "reference/ml-journal/architecture.md" },
        { "Skills (ml-journal)" = "reference/ml-journal/skills.md" },
        { "Entry Types & Schema" = "reference/ml-journal/entry-types.md" },
        { "Scripts & CLI"     = "reference/scripts.md" },
        { "Configuration"     = "reference/configuration.md" },
    ] },

    { "Explanation" = [
        { "Overview"              = "explanation/index.md" },
        { "Project Origin"        = "explanation/origin.md" },
        { "The Experiment Arc"    = "explanation/experiment-arc.md" },
        { "Debate Protocol"       = "explanation/debate-protocol.md" },
        { "Evaluation Methodology" = "explanation/evaluation.md" },
        { "Post-Mortems & Lessons" = "explanation/post-mortems.md" },
    ] },

    { "Research" = [
        { "Overview"           = "research/index.md" },
        { "Working Paper"      = "research/working-paper.md" },
        { "Related Work"       = "research/related-work.md" },
        { "v1-v3 Early Rounds" = "research/reports/v1-v3.md" },
        { "v4 Preregistered"   = "research/reports/v4.md" },
        { "v5 Benchmark Gen"   = "research/reports/v5.md" },
        { "v6 Ensemble"        = "research/reports/v6.md" },
        { "v7 Refined"         = "research/reports/v7.md" },
        { "v8 Active"          = "research/reports/v8.md" },
        { "Presentations"      = "research/slides.md" },
    ] },
]


# ----------------------------------------------------------------------------
# Theme: modern variant of Material's look and feel.
# ----------------------------------------------------------------------------
[project.theme]
variant  = "modern"
language = "en"

features = [
    "announce.dismiss",
    "content.action.edit",
    "content.action.view",
    "content.code.annotate",
    "content.code.copy",
    "content.code.select",
    "content.footnote.tooltips",
    "content.tabs.link",
    "content.tooltips",
    "navigation.expand",
    "navigation.footer",
    "navigation.indexes",
    "navigation.instant",
    "navigation.instant.prefetch",
    "navigation.path",
    "navigation.sections",
    "navigation.tabs",
    "navigation.tabs.sticky",
    "navigation.top",
    "navigation.tracking",
    "search.highlight",
]

[project.theme.icon]
edit = "material/pencil"
view = "material/eye"

[[project.theme.palette]]
scheme      = "default"
toggle.icon = "lucide/sun"
toggle.name = "Switch to dark mode"

[[project.theme.palette]]
scheme      = "slate"
toggle.icon = "lucide/moon"
toggle.name = "Switch to light mode"


# ----------------------------------------------------------------------------
# Markdown extensions — Material-equivalent set.
# ----------------------------------------------------------------------------
[project.markdown_extensions.abbr]
[project.markdown_extensions.admonition]
[project.markdown_extensions.attr_list]
[project.markdown_extensions.def_list]
[project.markdown_extensions.footnotes]
[project.markdown_extensions.md_in_html]

[project.markdown_extensions.toc]
permalink = true

[project.markdown_extensions.pymdownx.arithmatex]
generic = true

[project.markdown_extensions.pymdownx.betterem]
[project.markdown_extensions.pymdownx.caret]
[project.markdown_extensions.pymdownx.details]

[project.markdown_extensions.pymdownx.emoji]
emoji_generator = "zensical.extensions.emoji.to_svg"
emoji_index     = "zensical.extensions.emoji.twemoji"

[project.markdown_extensions.pymdownx.highlight]
anchor_linenums     = true
line_spans          = "__span"
pygments_lang_class = true

[project.markdown_extensions.pymdownx.inlinehilite]
[project.markdown_extensions.pymdownx.keys]
[project.markdown_extensions.pymdownx.magiclink]
[project.markdown_extensions.pymdownx.mark]
[project.markdown_extensions.pymdownx.smartsymbols]

[project.markdown_extensions.pymdownx.superfences]
custom_fences = [
  { name = "mermaid", class = "mermaid", format = "pymdownx.superfences.fence_code_format" }
]

[project.markdown_extensions.pymdownx.tabbed]
alternate_style     = true
combine_header_slug = true

[project.markdown_extensions.pymdownx.tasklist]
custom_checkbox = true

[project.markdown_extensions.pymdownx.tilde]
